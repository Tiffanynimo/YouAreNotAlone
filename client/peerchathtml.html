<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Support Chatroom | You Are Not Alone</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #B68597, #DAB6C2, #F2E6EA);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  /* ── Join screen ─────────────────────────────────────────────── */
  #nickname-screen {
    background: #F2E6EA;
    border-radius: 20px;
    padding: 40px;
    text-align: center;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    width: 340px;
  }
  #nickname-screen h2 { color: #B68597; margin-bottom: 12px; }
  #nickname-screen p  { color: #666; font-size: 0.9rem; margin-bottom: 20px; }
  #nickname-screen input {
    width: 100%; padding: 12px; border-radius: 10px;
    border: 1px solid #DAB6C2; background: #DAB6C2;
    margin-bottom: 15px; font-size: 1rem;
  }
  #nickname-screen button {
    background: #B68597; border: none; padding: 12px 24px;
    border-radius: 12px; cursor: pointer; color: white;
    font-weight: bold; font-size: 1rem; width: 100%; transition: 0.3s;
  }
  #nickname-screen button:hover { background: #9C6C7F; }
  #join-error {
    color: #c0392b; background: #fdecea; border-radius: 8px;
    padding: 8px 12px; font-size: 0.85rem; margin-top: 10px; display: none;
  }

  /* ── Main chat layout ────────────────────────────────────────── */
  .chat-wrapper { display: none; width: 95%; height: 92vh; background: #DAB6C2; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
  .chat-wrapper.visible { display: flex; }

  /* Sidebar */
  .user-list {
    width: 220px; flex-shrink: 0; background: #F2E6EA;
    padding: 16px; border-right: 3px solid #B68597;
    overflow-y: auto; display: flex; flex-direction: column; gap: 0;
  }
  .user-list h2 { color: #B68597; margin-bottom: 6px; font-size: 1rem; }
  .online-count { font-size: 0.78rem; color: #888; margin-bottom: 10px; }

  .user-item {
    padding: 10px 12px; background: #C79DAA; border-radius: 10px;
    margin-bottom: 8px; cursor: pointer; transition: 0.2s;
    display: flex; align-items: center; gap: 8px; font-size: 0.9rem;
  }
  .user-item:hover, .user-item.active { background: #B68597; color: white; }
  .user-item .dot { width: 8px; height: 8px; background: #4caf50; border-radius: 50%; flex-shrink: 0; }
  .user-item.me { font-style: italic; cursor: default; }
  .dm-badge {
    background: #e74c3c; color: white; border-radius: 50%;
    min-width: 18px; height: 18px; font-size: 0.7rem;
    display: inline-flex; align-items: center; justify-content: center;
    margin-left: auto; padding: 0 3px;
  }

  /* Chat area */
  .chat-area { flex: 1; display: flex; flex-direction: column; padding: 16px; min-width: 0; }
  .chat-title { font-weight: bold; color: #7a3e52; margin-bottom: 8px; font-size: 1rem; }

  .messages {
    flex: 1; overflow-y: auto; background: #F2E6EA;
    padding: 16px; border-radius: 15px;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.08);
    scroll-behavior: smooth;
  }

  .bubble {
    margin: 8px 0; background: #C79DAA; padding: 10px 14px;
    border-radius: 14px; max-width: 72%; word-wrap: break-word;
  }
  .bubble.self { background: #B68597; color: white; margin-left: auto; }
  .bubble .sender { font-size: 0.72rem; font-weight: bold; color: #7a3e52; margin-bottom: 4px; }
  .bubble.self .sender { color: #f8d7e1; }
  .timestamp { display: block; font-size: 0.68rem; color: #6b6b6b; margin-top: 4px; text-align: right; }
  .bubble.self .timestamp { color: #f0ccd6; }

  .system-msg { text-align: center; font-size: 0.78rem; color: #888; margin: 6px 0; font-style: italic; }

  /* Input bar */
  .input-bar { display: flex; margin-top: 12px; gap: 8px; align-items: flex-end; }
  .input-bar input {
    flex: 1; padding: 11px 14px; border-radius: 12px; border: none;
    background: #fff; font-size: 0.95rem; outline: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .input-bar button {
    background: #B68597; border: none; padding: 11px 18px;
    border-radius: 12px; cursor: pointer; color: white;
    font-weight: bold; transition: 0.2s; white-space: nowrap;
  }
  .input-bar button:hover { background: #9C6C7F; }
  .input-bar button:disabled { opacity: 0.5; cursor: not-allowed; }
  .char-counter { font-size: 0.72rem; color: #aaa; text-align: right; margin-top: 2px; }

  /* Private popup */
  .private-popup {
    position: fixed; bottom: 20px; right: 20px; width: 310px;
    background: #F2E6EA; border-radius: 16px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.2);
    display: none; flex-direction: column; z-index: 1000;
  }
  .private-popup.open { display: flex; }
  .private-header {
    padding: 12px 16px; background: #B68597; color: white;
    border-radius: 16px 16px 0 0; font-weight: bold;
    display: flex; justify-content: space-between; align-items: center;
  }
  .close-btn {
    cursor: pointer; padding: 3px 9px; border-radius: 7px;
    background: rgba(255,255,255,0.25); user-select: none;
  }
  .private-messages { height: 220px; padding: 10px; overflow-y: auto; scroll-behavior: smooth; }
  .private-input { display: flex; flex-direction: column; padding: 10px; gap: 4px; }
  .private-input-row { display: flex; gap: 6px; }
  .private-input input {
    flex: 1; padding: 8px 12px; border-radius: 10px;
    border: none; background: #DAB6C2; font-size: 0.9rem;
  }
  .private-input button {
    padding: 8px 13px; background: #B68597; border: none;
    color: white; border-radius: 10px; cursor: pointer; font-weight: bold;
  }
  .private-input button:disabled { opacity: 0.5; cursor: not-allowed; }
  .typing-indicator {
    padding: 4px 10px; font-size: 0.78rem; color: #999;
    font-style: italic; display: none;
  }

  /* Loading state */
  .loading-history { text-align: center; color: #aaa; font-size: 0.82rem; padding: 12px; }
</style>
</head>
<body>

<!-- Join screen -->
<div id="nickname-screen">
  <h2>Support Chatroom</h2>
  <p>You are safe here. Join the peer support chat.</p>
  <input id="nickname-input" type="text" placeholder="Your nickname (e.g. Hope)" maxlength="30" />
  <button id="join-btn">Join Chat</button>
  <div id="join-error"></div>
</div>

<!-- Main chat -->
<div class="chat-wrapper" id="chat-wrapper">
  <div class="user-list">
    <h2>Online</h2>
    <div class="online-count" id="online-count">0 online</div>
    <div id="user-list-items"></div>
  </div>

  <div class="chat-area">
    <div class="chat-title" id="chat-title">Public Room</div>
    <div class="messages" id="publicMessages"></div>
    <div class="input-bar">
      <input id="publicInput" placeholder="Type a message to everyone..." maxlength="500" />
      <button id="sendPublicBtn">Send</button>
    </div>
    <div class="char-counter" id="publicCounter">0 / 500</div>
  </div>
</div>

<!-- Private chat popup -->
<div class="private-popup" id="privatePopup">
  <div class="private-header">
    <span id="privateChatTitle">Private Chat</span>
    <span class="close-btn" id="closePrivateBtn">✕</span>
  </div>
  <div class="private-messages" id="privateMessages"></div>
  <div class="typing-indicator" id="dmTypingIndicator"></div>
  <div class="private-input">
    <div class="private-input-row">
      <input id="privateInput" placeholder="Message..." maxlength="500" />
      <button id="sendPrivateBtn">Send</button>
    </div>
    <div class="char-counter" id="privateCounter">0 / 500</div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script type="module">
  import { initCrypto, getSharedKey, encryptMessage, decryptMessage } from "/lib/crypto.js";

  const socket = io();

  let myNickname = "";
  let myUserId = null;
  let privateChatTarget = null;
  let privateChatTargetId = null;
  let myCryptoState = null;  // { privateKey, publicKeyB64 }
  let dmSharedKey = null;    // AES-GCM key for current DM
  const dmUnread = {};       // nickname → unread count
  const pendingMessages = {}; // nickname → queued incoming messages

  function formatTime(isoString) {
    return new Date(isoString).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function makeBubble({ nickname, text, timestamp, isSelf, container }) {
    const box = document.createElement("div");
    box.className = "bubble" + (isSelf ? " self" : "");
    box.innerHTML = `
      <div class="sender">${isSelf ? "You" : escapeHtml(nickname)}</div>
      ${escapeHtml(text)}
      <span class="timestamp">${formatTime(timestamp)}</span>
    `;
    container.appendChild(box);
  }

  // Decrypt bubble text in-place if E2EE prefix found
  async function makeBubbleDecrypted({ nickname, text, timestamp, isSelf, container }) {
    const box = document.createElement("div");
    box.className = "bubble" + (isSelf ? " self" : "");
    const contentSpan = document.createElement("span");

    if (text.startsWith("ENC:") && dmSharedKey) {
      contentSpan.textContent = "...";
      decryptMessage(dmSharedKey, text)
        .then(plain => { contentSpan.textContent = plain; })
        .catch(() => { contentSpan.textContent = "[Encrypted message]"; });
    } else {
      contentSpan.textContent = text.startsWith("ENC:") ? "[Encrypted message]" : text;
    }

    box.innerHTML = `<div class="sender">${isSelf ? "You" : escapeHtml(nickname)}</div>`;
    box.appendChild(contentSpan);
    const ts = document.createElement("span");
    ts.className = "timestamp";
    ts.textContent = formatTime(timestamp);
    box.appendChild(ts);
    container.appendChild(box);
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function scrollBottom(el) {
    el.scrollTop = el.scrollHeight;
  }

  // ── Auto-fill nickname from session ──────────────────────────────
  (async function tryAutoJoin() {
    try {
      const res = await fetch('/api/auth/get-session', { credentials: 'include' });
      const data = await res.json();
      if (data && data.user) {
        myUserId = data.user.id || null;
        const nickname = data.user.fullname || data.user.name || '';
        if (nickname) {
          document.getElementById("nickname-input").value = nickname;
          // Init E2EE for authenticated users
          if (myUserId) {
            myCryptoState = await initCrypto(myUserId).catch(() => null);
          }
          joinChat();
        }
      }
    } catch (e) {
      // No session — user enters nickname manually
    }
  })();

  // ── Join ─────────────────────────────────────────────────────────
  document.getElementById("join-btn").addEventListener("click", joinChat);
  document.getElementById("nickname-input").addEventListener("keydown", e => {
    if (e.key === "Enter") joinChat();
  });

  async function joinChat() {
    const val = document.getElementById("nickname-input").value.trim();
    if (!val) return;
    myNickname = val;

    const errEl = document.getElementById("join-error");
    errEl.style.display = "none";

    document.getElementById("nickname-screen").style.display = "none";
    document.getElementById("chat-wrapper").classList.add("visible");

    socket.emit("join", { id: myUserId, nickname: myNickname });

    // Load public chat history from DB
    const pubMsgs = document.getElementById("publicMessages");
    pubMsgs.innerHTML = '<div class="loading-history">Loading chat history...</div>';

    try {
      const history = await fetch('/api/peer-chat/public').then(r => r.json());
      pubMsgs.innerHTML = '';
      if (history.length > 0) {
        addSystemMessage(`— ${history.length} previous messages —`);
        history.forEach(msg => {
          makeBubble({
            nickname: msg.sender_nickname,
            text: msg.text,
            timestamp: msg.created_at,
            isSelf: msg.sender_nickname === myNickname,
            container: pubMsgs,
          });
        });
      }
    } catch (e) {
      pubMsgs.innerHTML = '';
    }

    addSystemMessage(`You joined as <strong>${escapeHtml(myNickname)}</strong>`);
    scrollBottom(pubMsgs);
  }

  // ── Nickname taken ─────────────────────────────────────────────
  socket.on("nickname-taken", () => {
    myNickname = "";
    document.getElementById("chat-wrapper").classList.remove("visible");
    document.getElementById("nickname-screen").style.display = "block";
    const errEl = document.getElementById("join-error");
    errEl.textContent = "Nickname already in use, please choose another";
    errEl.style.display = "block";
  });

  // ── Online users list ─────────────────────────────────────────────
  socket.on("online-users", (users) => {
    const container = document.getElementById("user-list-items");
    const countEl   = document.getElementById("online-count");
    countEl.textContent = `${users.length} online`;
    container.innerHTML = "";

    users.forEach(u => {
      const div = document.createElement("div");
      const isMe = u.nickname === myNickname;
      div.className = "user-item" + (isMe ? " me" : "") + (u.nickname === privateChatTarget ? " active" : "");

      const dot = document.createElement("span");
      dot.className = "dot";
      div.appendChild(dot);

      const nameSpan = document.createElement("span");
      nameSpan.textContent = u.nickname + (isMe ? ' (you)' : '');
      div.appendChild(nameSpan);

      // Unread badge
      const unread = dmUnread[u.nickname] || 0;
      if (unread > 0) {
        const badge = document.createElement("span");
        badge.className = "dm-badge";
        badge.textContent = unread;
        div.appendChild(badge);
      }

      if (!isMe) {
        div.title = `Click to private message ${u.nickname}`;
        div.addEventListener("click", () => openPrivateChat(u.nickname, u.id || null));
      }
      container.appendChild(div);
    });
  });

  // ── Public chat ───────────────────────────────────────────────────
  document.getElementById("sendPublicBtn").addEventListener("click", sendPublic);
  document.getElementById("publicInput").addEventListener("keydown", e => {
    if (e.key === "Enter") sendPublic();
  });
  document.getElementById("publicInput").addEventListener("input", function() {
    document.getElementById("publicCounter").textContent = `${this.value.length} / 500`;
  });

  function sendPublic() {
    const input = document.getElementById("publicInput");
    const text = input.value.trim();
    if (!text || text.length > 500 || !myNickname) return;
    socket.emit("public-message", { nickname: myNickname, text, userId: myUserId });
    input.value = "";
    document.getElementById("publicCounter").textContent = "0 / 500";
  }

  socket.on("public-message", ({ nickname, text, timestamp }) => {
    const msgs = document.getElementById("publicMessages");
    makeBubble({ nickname, text, timestamp, isSelf: nickname === myNickname, container: msgs });
    scrollBottom(msgs);
  });

  // ── Private chat ──────────────────────────────────────────────────
  async function openPrivateChat(targetNickname, targetUserId = null) {
    privateChatTarget = targetNickname;
    privateChatTargetId = targetUserId;
    dmSharedKey = null;

    document.getElementById("privateChatTitle").textContent = `💬 ${targetNickname}`;
    document.getElementById("privateMessages").innerHTML = '<div class="loading-history">Loading...</div>';
    document.getElementById("privatePopup").classList.add("open");
    document.getElementById("privateInput").focus();

    // Clear unread badge for this user
    dmUnread[targetNickname] = 0;
    // Refresh user list to clear badge
    // (will update on next online-users event; clear immediately in DOM)
    document.querySelectorAll(".user-item").forEach(el => {
      const nameEl = el.querySelector("span:not(.dot):not(.dm-badge)");
      if (nameEl && nameEl.textContent.startsWith(targetNickname)) {
        const badge = el.querySelector(".dm-badge");
        if (badge) badge.remove();
      }
      el.classList.toggle("active", el.querySelector("span:not(.dot):not(.dm-badge)")?.textContent.startsWith(targetNickname));
    });

    // E2EE setup if both users are authenticated
    if (myCryptoState && targetUserId) {
      try {
        const res = await fetch(`/api/crypto/public-key/${targetUserId}`, { credentials: 'include' });
        if (res.ok) {
          const { publicKey } = await res.json();
          dmSharedKey = await getSharedKey(myCryptoState.privateKey, publicKey);
          document.getElementById("privateChatTitle").textContent = `💬 ${targetNickname} 🔒`;
        }
      } catch (e) {
        dmSharedKey = null;
      }
    }

    // Load DM history from DB
    try {
      const history = await fetch(
        `/api/peer-chat/private?me=${encodeURIComponent(myNickname)}&with=${encodeURIComponent(targetNickname)}`
      ).then(r => r.json());

      const container = document.getElementById("privateMessages");
      container.innerHTML = '';
      for (const msg of history) {
        await makeBubbleDecrypted({
          nickname: msg.sender_nickname,
          text: msg.text,
          timestamp: msg.created_at,
          isSelf: msg.sender_nickname === myNickname,
          container,
        });
      }
      scrollBottom(container);
    } catch (e) {
      document.getElementById("privateMessages").innerHTML = '';
    }

    // Flush any pending messages that arrived before history loaded
    if (pendingMessages[targetNickname]) {
      const container = document.getElementById("privateMessages");
      for (const msg of pendingMessages[targetNickname]) {
        await makeBubbleDecrypted({ nickname: msg.from, text: msg.text, timestamp: msg.timestamp, isSelf: false, container });
      }
      delete pendingMessages[targetNickname];
      scrollBottom(container);
    }
  }

  document.getElementById("closePrivateBtn").addEventListener("click", () => {
    document.getElementById("privatePopup").classList.remove("open");
    privateChatTarget = null;
    privateChatTargetId = null;
    dmSharedKey = null;
    document.querySelectorAll(".user-item").forEach(el => el.classList.remove("active"));
  });

  document.getElementById("sendPrivateBtn").addEventListener("click", sendPrivate);
  document.getElementById("privateInput").addEventListener("keydown", e => {
    if (e.key === "Enter") sendPrivate();
  });
  document.getElementById("privateInput").addEventListener("input", function() {
    document.getElementById("privateCounter").textContent = `${this.value.length} / 500`;
    // Typing indicator
    if (privateChatTarget) {
      socket.emit("typing", { toNickname: privateChatTarget });
    }
  });

  async function sendPrivate() {
    const input = document.getElementById("privateInput");
    const text = input.value.trim();
    if (!text || text.length > 500 || !privateChatTarget || !myNickname) return;

    let outText = text;
    if (dmSharedKey) {
      outText = await encryptMessage(dmSharedKey, text);
    }

    socket.emit("private-message", {
      toNickname: privateChatTarget,
      fromNickname: myNickname,
      text: outText,
      userId: myUserId,
    });
    input.value = "";
    document.getElementById("privateCounter").textContent = "0 / 500";
    socket.emit("stop-typing", { toNickname: privateChatTarget });
  }

  socket.on("private-message", async ({ from, to, text, timestamp, isSelf }) => {
    const container = document.getElementById("privateMessages");

    // Incoming from someone else and popup isn't open for them → queue + open
    if (!isSelf && privateChatTarget !== from) {
      dmUnread[from] = (dmUnread[from] || 0) + 1;
      if (!pendingMessages[from]) pendingMessages[from] = [];
      pendingMessages[from].push({ from, text, timestamp });
      openPrivateChat(from, null);
      return;
    }

    await makeBubbleDecrypted({ nickname: from, text, timestamp, isSelf: !!isSelf, container });
    scrollBottom(container);
  });

  // ── Typing indicators (peer DMs) ──────────────────────────────────
  socket.on("typing", ({ from }) => {
    if (from !== privateChatTarget) return;
    const indicator = document.getElementById("dmTypingIndicator");
    indicator.textContent = `${escapeHtml(from)} is typing...`;
    indicator.style.display = "block";
    clearTimeout(indicator._timer);
    indicator._timer = setTimeout(() => { indicator.style.display = "none"; }, 3000);
  });

  socket.on("stop-typing", ({ from }) => {
    if (from !== privateChatTarget) return;
    const indicator = document.getElementById("dmTypingIndicator");
    clearTimeout(indicator._timer);
    indicator.style.display = "none";
  });

  // ── System messages ───────────────────────────────────────────────
  function addSystemMessage(html) {
    const div = document.createElement("div");
    div.className = "system-msg";
    div.innerHTML = html;
    const msgs = document.getElementById("publicMessages");
    msgs.appendChild(div);
  }
</script>

</body>
</html>
